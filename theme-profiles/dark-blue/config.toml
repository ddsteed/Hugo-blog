# ==============================================================================
# Hugo Theme Stack 配置文件
# ==============================================================================

# ------------------------------------------------------------------------------
# 基础配置
# ------------------------------------------------------------------------------
baseURL = "/"
locale = "zh-cn"
title = "点点马的逍遥港"
theme = "stack"

# 基础设置
enableRobotsTXT = true
enableEmoji = true
enableGitInfo = true
hasCJKLanguage = true
defaultContentLanguage = "zh-cn"

# ------------------------------------------------------------------------------
# 模块导入
# ------------------------------------------------------------------------------
# [[module.imports]]
#     path = "github.com/CaiJimmy/hugo-theme-stack/v3"

# ------------------------------------------------------------------------------
# 分页设置
# ------------------------------------------------------------------------------
[pagination]
  pagerSize = 6

# ------------------------------------------------------------------------------
# 固定链接设置
# ------------------------------------------------------------------------------
[permalinks]
  post = "/post/:slug/"
  page = "/:slug/"

# ------------------------------------------------------------------------------
# 语言配置
# ------------------------------------------------------------------------------
[languages]
  [languages.zh-cn]
    label = "简体中文"
    title = "点点马的逍遥港"
    weight = 1

    [languages.zh-cn.params.sidebar]
      #subtitle = "无所事事的创业者 | 技术生活的观察者"
      subtitle = "Old Fashion Man"

# ------------------------------------------------------------------------------
# 导航菜单
# ------------------------------------------------------------------------------
[[menu.main]]
  identifier = "home"
  name = "首页"
  url = "/"
  weight = 10

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 20

[[menu.main]]
  identifier = "archive"
  name = "归档"
  url = "/archive/"
  weight = 30

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 40

[[menu.main]]
  identifier = "categories"
  name = "分类"
  url = "/categories/"
  weight = 50

# ------------------------------------------------------------------------------
# 主题参数
# ------------------------------------------------------------------------------
[params]
  mainSections = ["post"]
  rssFullContent = true
  favicon = "/favicon.ico"

# ------------------------------------------------------------------------------
# Sidebar 侧边栏配置
# ------------------------------------------------------------------------------
[params.sidebar]
  emoji = ""  # 留空以隐藏 emoji
  subtitle = "Old Fashion Man"
  avatar = "/img/fox.png"
  compact = false

# ------------------------------------------------------------------------------
# 文章页面配置
# ------------------------------------------------------------------------------
[params.article]
  headingAnchor = false
  math = true
  toc = true
  readingTime = true
  wordcount = true

  [params.article.list]
    showTags = false

  [params.article.license]
    enabled = false

  [params.article.alertIcon]
    note = "📝"
    tip = "💡"
    important = "📌"
    warning = "⚠️"
    caution = "🚨"

  [params.article.tip]
    enabled = true
    wechat = "/img/wechat.jpg"
    alipay = "/img/alipay.jpg"

# ------------------------------------------------------------------------------
# Widget 小部件配置
# ------------------------------------------------------------------------------
[params.widgets]
  homepage = [
    { type = "search" },
    { type = "archives" },
    { type = "categories", params = { limit = 10 } },
    { type = "tag-cloud", params = { limit = 20 } },
  ]
  page = [
    { type = "toc" }
  ]

# ------------------------------------------------------------------------------
# 社交媒体配置
# ------------------------------------------------------------------------------
[[params.social]]
  identifier = "github"
  name = "GitHub"
  url = "https://github.com/ddsteed"

  [params.social.params]
    icon = "brand-github"

[[params.social]]
  identifier = "email"
  name = "Email"
  url = "mailto:ddsteed@gmail.com"

  [params.social.params]
    icon = "mail"

[[params.social]]
  identifier = "rss"
  name = "RSS"
  url = "/index.xml"

  [params.social.params]
    icon = "rss"

# ------------------------------------------------------------------------------
# Footer 页脚配置
# ------------------------------------------------------------------------------
[params.footer]
  since = 2012
  customText = ""

# ------------------------------------------------------------------------------
# 日期格式
# ------------------------------------------------------------------------------
[params.dateFormat]
  published = ":date_full"
  lastUpdated = ":date_full"

# ------------------------------------------------------------------------------
# Open Graph 配置
# ------------------------------------------------------------------------------
[params.opengraph.twitter]
  site = ""
  card = "summary_large_image"

# ------------------------------------------------------------------------------
# 颜色主题
# ------------------------------------------------------------------------------
[params.colorScheme]
  toggle = true
  default = "auto"

# ------------------------------------------------------------------------------
# 自定义样式配置（可移植美化系统）
# ------------------------------------------------------------------------------
# 说明：所有颜色、字体、间距、阴影等样式均可在此配置
# 移植到其他主题时，只需复制 [params.style] 部分和对应文件：
#   - layouts/partials/head/custom.html（CSS 变量注入）
#   - assets/scss/custom.scss（使用变量的样式层）
# ------------------------------------------------------------------------------
[params.style]

  # ==================== 布局尺寸 ====================
  sidebarWidth = "320px"
  headerHeight = "64px"
  articleMaxWidth = "720px"

  # ==================== 组件尺寸 ====================
  sidebarAvatarSize = "160px"
  articleTitleSize = "1.4rem"
  articleBodySize = "1.1rem"
  cardImageHeight = "200px"
  cardHoverOffset = "-4px"

  # ==================== 颜色系统 ====================
  [params.style.colors]
    # 主色（链接、按钮等）
    primary = "#0f1b3d"
    primaryHover = "#1a2b5e"
    primaryLight = "#3d5a9e"

    # 强调色
    accent = "#0f1b3d"
    accentHover = "#1a2b5e"

    # 状态色
    success = "#10b981"
    warning = "#f59e0b"
    error = "#ef4444"
    info = "#06b6d4"

    # 背景色（浅色模式）
    bgPrimary = "#ffffff"
    bgSecondary = "#f4f7fe"
    bgTertiary = "#eef2fa"

    # 文本色（浅色模式）
    textPrimary = "#0f1b3d"
    textSecondary = "#4a5a7a"
    textMuted = "#8a95a8"

    # 边框和分割线
    border = "#d8e0f0"
    divider = "#c8d2e8"

    # 暗色模式颜色
    darkBgPrimary = "#0f172a"
    darkBgSecondary = "#1e293b"
    darkTextPrimary = "#e2e8f0"    # 主要文本 - 温和的米白色
    darkTextSecondary = "#cbd5e1"  # 次要文本 - 提亮至中灰色，更清晰
    darkTextMuted = "#94a3b8"      # 弱化文本
    darkBorder = "#334155"

  # ==================== 字体系统 ====================
  [params.style.fonts]
    # 字体家族
    base = "'-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', sans-serif"
    heading = "'-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', sans-serif"
    mono = "'JetBrains Mono', 'Fira Code', 'Consolas', monospace"

    # 字体大小
    xs = "0.75rem"   # 12px
    sm = "0.875rem"  # 14px
    lg = "1.125rem"  # 18px
    xl = "1.25rem"   # 20px
    "2xl" = "1.5rem"    # 24px
    "3xl" = "1.875rem"  # 30px
    "4xl" = "2.25rem"   # 36px

    # 行高
    lineHeightTight = "1.25"
    lineHeightNormal = "1.6"
    lineHeightRelaxed = "1.8"

  # ==================== 间距系统 ====================
  [params.style.spacing]
    xs = "0.5rem"   # 8px
    sm = "0.75rem"  # 12px
    md = "1rem"     # 16px
    lg = "1.5rem"   # 24px
    xl = "2rem"     # 32px
    "2xl" = "3rem"  # 48px
    "3xl" = "4rem"  # 64px

  # ==================== 效果（圆角、阴影、过渡） ====================
  [params.style.effects]
    # 圆角
    radiusSm = "4px"
    radiusMd = "8px"
    radiusLg = "12px"
    radiusXl = "16px"
    radiusFull = "9999px"

    # 阴影
    shadowSm = "0 1px 2px rgba(0, 0, 0, 0.05)"
    shadowMd = "0 4px 6px rgba(0, 0, 0, 0.07)"
    shadowLg = "0 10px 15px rgba(0, 0, 0, 0.1)"
    shadowXl = "0 20px 25px rgba(0, 0, 0, 0.15)"

    # 过渡动画
    transitionFast = "150ms ease"
    transitionBase = "250ms ease"
    transitionSlow = "350ms ease"

# ------------------------------------------------------------------------------
# 评论系统（禁用）
# ------------------------------------------------------------------------------
[params.comments]
  enabled = false
  provider = "disqus"

# ------------------------------------------------------------------------------
# 图片处理
# ------------------------------------------------------------------------------
[params.imageProcessing]
  autoOrient = false

  [params.imageProcessing.external]
    timeout = "5s"

  [params.imageProcessing.content]
    widths = [800, 1600, 2400]
    enabled = true

  [params.imageProcessing.thumbnail]
    enabled = true

# ------------------------------------------------------------------------------
# GDPR Cookie（禁用）
# ------------------------------------------------------------------------------
[params.cookies]
  enabled = false
  showSettings = true

  [params.cookies.categories]
    analytics = true
    functional = true

# ------------------------------------------------------------------------------
# Disqus 评论（禁用时可不配置 shortname）
# ------------------------------------------------------------------------------
# [services.disqus]
#   shortname = "your-disqus-shortname"

# ------------------------------------------------------------------------------
# Markdown 渲染配置
# ------------------------------------------------------------------------------
[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true

        [markup.goldmark.extensions.passthrough.delimiters]
          block = [["\\[", "\\]"], ["$$", "$$"]]
          inline = [["\\(", "\\)"]]

    [markup.goldmark.renderer]
      unsafe = true

  [markup.tableOfContents]
    endLevel = 4
    ordered = true
    startLevel = 2

  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    lineNumbersInTable = true
    tabWidth = 4
    style = "catppuccin-macchiato"
