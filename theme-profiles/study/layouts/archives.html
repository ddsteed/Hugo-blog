{{ define "main" }}
<div class="archive-page">
  <header class="archive-header">
    <h1>{{ i18n "widget.archives.title" }}</h1>
  </header>

  {{ range $.Site.RegularPages.GroupByDate "2006" }}
  <section class="archive-year">
    <h2 class="year-title">{{ .Key }} <span class="year-count">{{ len .Pages }} 篇</span></h2>
    <div class="year-posts">
      {{ range .Pages }}
      <article class="archive-post">
        <a href="{{ .RelPermalink }}" class="archive-link">
          <time class="archive-date" datetime="{{ .Date.Format "2006-01-02" }}">
            {{ .Date.Format "1月2日" }}
          </time>
          <span class="archive-title">{{ .Title }}</span>
        </a>
      </article>
      {{ end }}
    </div>
  </section>
  {{ end }}
</div>

<style>
.archive-page {
  animation: fadeIn 0.8s ease;
}

.archive-header {
  margin-bottom: 1.5rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}

.archive-year {
  margin-bottom: 1.25rem;
}

.year-title {
  font-family: var(--font-heading);
  font-size: 1.5rem;
  color: var(--accent);
  margin-bottom: 0.625rem;
  display: flex;
  align-items: baseline;
  gap: 1.5rem;
}

.year-count {
  font-size: 0.875rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-weight: normal;
}

.year-posts {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}

.archive-post {
  padding: 0.25rem 0;
  border-bottom: 1px solid var(--border);
}

.archive-link {
  display: flex;
  align-items: baseline;
  gap: 1rem;
}

.archive-date {
  font-size: 0.875rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
  min-width: 60px;
}

.archive-title {
  font-size: 1rem;
  color: var(--text-primary);
}

.archive-link:hover .archive-title {
  color: var(--accent);
}
</style>
{{ end }}
