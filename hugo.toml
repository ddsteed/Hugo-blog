# ==============================================================================
# 温暖的书房 (Warm Study) 主题配置
# ==============================================================================

# ------------------------------------------------------------------------------
# 基础配置
# ------------------------------------------------------------------------------
baseURL = "/"
locale = "zh-cn"
title = "点点马的逍遥港"
theme = "stack"

# 基础设置
enableRobotsTXT = true
enableEmoji = true
enableGitInfo = true
hasCJKLanguage = true
defaultContentLanguage = "zh-cn"

# ------------------------------------------------------------------------------
# 分页设置
# ------------------------------------------------------------------------------
[pagination]
  pagerSize = 10

# ------------------------------------------------------------------------------
# 固定链接设置
# ------------------------------------------------------------------------------
[permalinks]
  post = "/post/:slug/"
  page = "/:slug/"

# ------------------------------------------------------------------------------
# 语言配置
# ------------------------------------------------------------------------------
[languages]
  [languages.zh-cn]
    label = "简体中文"
    title = "点点马的逍遥港"
    weight = 1

    [languages.zh-cn.params.sidebar]
      subtitle = "Old Fashion Man"

# ------------------------------------------------------------------------------
# 导航菜单
# ------------------------------------------------------------------------------
[[menu.main]]
  identifier = "home"
  name = "首页"
  url = "/"
  weight = 10

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 20

[[menu.main]]
  identifier = "archive"
  name = "归档"
  url = "/archive/"
  weight = 30

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 40

[[menu.main]]
  identifier = "categories"
  name = "分类"
  url = "/categories/"
  weight = 50

# ------------------------------------------------------------------------------
# 主题参数
# ------------------------------------------------------------------------------
[params]
  mainSections = ["post"]
  rssFullContent = true
  favicon = "/favicon.ico"

  # 作者信息
  [params.author]
    name = "Hao Feng"
    nickname = "F1"
    email = "ddsteed@gmail.com"
    github = "https://github.com/ddsteed"
    homepage = "https://www.ddsteed.space/"

  # 保留头像和基本信息
  [params.sidebar]
    emoji = ""
    subtitle = "Old Fashion Man"
    avatar = "/img/fox.png"
    compact = false
    bio = ["F-Ai 工作室联合创始人", "物理学博士/教授", "自由自在的鸟"]

  # 文章页面配置
  [params.article]
    headingAnchor = false
    math = true
    toc = true
    readingTime = true
    wordcount = true

    [params.article.list]
      showTags = false

    [params.article.license]
      enabled = false

    [params.article.tip]
      enabled = true
      wechat = "/img/wechat.jpg"
      alipay = "/img/alipay.jpg"

  # 页脚配置
  [params.footer]
    since = 2012
    customText = ""

  # 日期格式
  [params.dateFormat]
    published = "January 2, 2006"
    lastUpdated = "January 2, 2006"

  # 颜色主题切换
  [params.colorScheme]
    toggle = false
    default = "auto"

# ------------------------------------------------------------------------------
# Markdown 渲染配置
# ------------------------------------------------------------------------------
[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true

        [markup.goldmark.extensions.passthrough.delimiters]
          block = [["\\[", "\\]"], ["$$", "$$"]]
          inline = [["\\(", "\\)"]]

    [markup.goldmark.renderer]
      unsafe = true

  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2

  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    lineNumbersInTable = true
    tabWidth = 4
    style = "monokai"
    lineNoStart = 1
